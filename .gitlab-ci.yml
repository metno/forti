stages:
  - build
  - publish artifacts
  - vulncheck

services:
  - name: docker:28-dind
    alias: docker

build docker: 
  tags:
    - teampunkt
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - export NAME=$(echo $CI_COMMIT_TAG | sed 's-/.*--')
    - export VERSION=$(echo $CI_COMMIT_TAG | sed 's-.*/--')
    - export IMAGE="fortiregistry.azurecr.io/$NAME:$VERSION"
    - docker login -u $azure_registry_username -p $azure_registry_password fortiregistry.azurecr.io
    - docker build -t "$IMAGE" -f "$NAME/build/package/Dockerfile" .
    - docker push "$IMAGE"


publish artifacts:
  tags:
    - teampunkt
  stage: publish artifacts
  rules:
    - if: "$CI_COMMIT_TAG =~ /^fortiup.*/"
  artifacts:
    name: "$CI_COMMIT_REF_SLUG"
    paths:
      - "$CI_COMMIT_REF_SLUG"
  script:
    - export NAME=$(echo $CI_COMMIT_TAG | sed 's-/.*--')
    - export VERSION=$(echo $CI_COMMIT_TAG | sed 's-.*/--')
    - export IMAGE="fortiregistry.azurecr.io/$NAME:$VERSION"
    - docker login -u $azure_registry_username -p $azure_registry_password fortiregistry.azurecr.io
    - docker pull "$IMAGE"
    - docker run --rm --entrypoint cat "$IMAGE" "/usr/local/bin/$NAME" > $CI_COMMIT_REF_SLUG
    - chmod +x $CI_COMMIT_REF_SLUG


# Since there are many C dependencies in f2, we build and push this image for use both as a devcontainer, and for vulncheck
devcontainer image:
  tags:
    - teampunkt
  stage: build
  when: manual
  script:
    - docker login -u $azure_registry_username -p $azure_registry_password fortiregistry.azurecr.io
    - docker build -t fortiregistry.azurecr.io/devcontainer:latest -f ".devcontainer/Dockerfile" .
    - docker push fortiregistry.azurecr.io/devcontainer:latest


vulncheck:
  tags:
    - teampunkt
  stage: vulncheck
  image: 
    # This requires ci/cd variable DOCKER_AUTH_CONFIG to be set. See https://docs.gitlab.com/ci/docker/using_docker_images/#access-an-image-from-a-private-container-registry
    name: fortiregistry.azurecr.io/devcontainer:latest
  script:
    - govulncheck ./...


trivy scan of Dockerfiles:
  tags:
    - teampunkt
  stage: vulncheck
  image: 
    name: aquasec/trivy
    entrypoint: [""]
  script:
  - for dockerfile in */build/package/Dockerfile; do
        echo "Scanning $dockerfile";
        trivy fs --scanners vuln,secret,license,misconfig "$dockerfile";
      done
